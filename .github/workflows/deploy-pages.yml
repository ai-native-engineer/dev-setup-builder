name: Deploy Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: test-results/screenshots
          if-no-files-found: warn
      - uses: actions/upload-pages-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          path: dist

  runner-fixture:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run safe macOS runner fixture
        if: runner.os == 'macOS'
        shell: bash
        run: |
          fixture=$'#!/bin/bash\nprintf "runner fixture ok\\n"\n'
          DEV_SETUP_SCRIPT_B64="$(printf '%s' "$fixture" | base64 | tr -d '\n')" bash public/run-mac.sh
      - name: Run safe Windows runner fixture
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $fixture = "@echo off`r`necho runner fixture ok`r`nexit /b 0`r`n"
          $env:DEV_SETUP_SCRIPT_B64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($fixture))
          & ./public/run-windows.ps1

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [verify, runner-fixture]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
